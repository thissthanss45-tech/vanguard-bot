apiVersion: v1
kind: ConfigMap
metadata:
  name: vanguard-bot-config
  namespace: vanguard
  labels:
    app: vanguard-bot
    app.kubernetes.io/part-of: vanguard-bot
data:
  # ─── Runtime ──────────────────────────────────────────────────────────────
  CACHE_BACKEND: "redis"
  REDIS_URL: "redis://redis:6379/0"
  REQUEST_TIMEOUT_SEC: "45"
  MARKET_CACHE_TTL_SEC: "90"
  NEWS_CACHE_TTL_SEC: "120"
  AI_PROVIDER_TIMEOUT_SEC: "22"
  AI_TOTAL_BUDGET_SEC: "24"
  DEEPSEEK_STRICT: "true"
  DEEPSEEK_FAST_PROMPT: "true"
  DEEPSEEK_REQUIRE_SUCCESS: "true"
  DEEPSEEK_MAX_TOKENS: "280"
  DEEPSEEK_MODEL: "deepseek-chat"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  ANTHROPIC_MODEL: "claude-3-5-sonnet-latest"
  # ─── Webhook (задаётся через Secret если URL секретный) ───────────────────
  USE_WEBHOOK: "true"
  WEBHOOK_PORT: "8080"
  WEBHOOK_PATH: "/telegram"
  # ─── Watchdog ─────────────────────────────────────────────────────────────
  WATCHDOG_INTERVAL_SEC: "180"
  # ─── API ──────────────────────────────────────────────────────────────────
  API_CORS_ORIGINS: "*"
