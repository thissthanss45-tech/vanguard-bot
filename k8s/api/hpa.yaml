apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vanguard-api
  namespace: vanguard
  labels:
    app.kubernetes.io/part-of: vanguard-bot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vanguard-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 400Mi
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
