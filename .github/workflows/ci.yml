name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check . --output-format=github

      - name: Type-check with mypy (api/ strict)
        run: |
          pip install mypy types-PyYAML pandas-stubs sqlalchemy[mypy]
          mypy api/ --config-file pyproject.toml

      - name: Run bot unit tests
        env:
          TELEGRAM_BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          CACHE_BACKEND: memory
        run: |
          pytest -q --ignore=tests/test_deepseek_live.py --ignore=tests/test_api.py -x

      - name: Run API unit tests
        env:
          API_ADMIN_KEY: "ci-admin-secret"
          API_DATABASE_URL: "sqlite:///:memory:"
          TELEGRAM_BOT_TOKEN: "0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          CACHE_BACKEND: memory
        run: |
          pytest -q tests/test_api.py -x

  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f Dockerfile \
            --build-arg BUILD_ENV=runtime \
            -t vanguard_bot:ci .

  helm-lint:
    name: Helm lint & template
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Helm lint (prod values)
        run: helm lint helm/vanguard-bot

      - name: Helm lint (staging values)
        run: helm lint helm/vanguard-bot -f helm/vanguard-bot/values.staging.yaml

      - name: Helm template dry-run
        run: |
          helm template vanguard-bot helm/vanguard-bot \
            --set secrets.telegramBotToken=test-token \
            --set secrets.apiAdminKey=test-key \
            > /dev/null
