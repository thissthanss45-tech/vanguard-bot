{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vanguard-bot.serviceAccountName" . }}
  namespace: {{ include "vanguard-bot.namespace" . }}
  labels:
    {{- include "vanguard-bot.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end }}
