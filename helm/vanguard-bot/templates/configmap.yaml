apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vanguard-bot.fullname" . }}-config
  namespace: {{ include "vanguard-bot.namespace" . }}
  labels:
    {{- include "vanguard-bot.labels" . | nindent 4 }}
data:
  CACHE_BACKEND:             {{ .Values.config.cacheBackend | quote }}
  REDIS_URL:                 {{ include "vanguard-bot.redisUrl" . | quote }}
  REQUEST_TIMEOUT_SEC:       {{ .Values.config.requestTimeoutSec | quote }}
  MARKET_CACHE_TTL_SEC:      {{ .Values.config.marketCacheTtlSec | quote }}
  NEWS_CACHE_TTL_SEC:        {{ .Values.config.newsCacheTtlSec | quote }}
  AI_PROVIDER_TIMEOUT_SEC:   {{ .Values.config.aiProviderTimeoutSec | quote }}
  AI_TOTAL_BUDGET_SEC:       {{ .Values.config.aiTotalBudgetSec | quote }}
  DEEPSEEK_STRICT:           {{ .Values.config.deepseekStrict | quote }}
  DEEPSEEK_FAST_PROMPT:      {{ .Values.config.deepseekFastPrompt | quote }}
  DEEPSEEK_REQUIRE_SUCCESS:  {{ .Values.config.deepseekRequireSuccess | quote }}
  DEEPSEEK_MAX_TOKENS:       {{ .Values.config.deepseekMaxTokens | quote }}
  DEEPSEEK_MODEL:            {{ .Values.config.deepseekModel | quote }}
  GROQ_MODEL:                {{ .Values.config.groqModel | quote }}
  ANTHROPIC_MODEL:           {{ .Values.config.anthropicModel | quote }}
  USE_WEBHOOK:               {{ .Values.config.useWebhook | quote }}
  WEBHOOK_PORT:              {{ .Values.config.webhookPort | quote }}
  WEBHOOK_PATH:              {{ .Values.config.webhookPath | quote }}
  WATCHDOG_INTERVAL_SEC:     {{ .Values.config.watchdogIntervalSec | quote }}
  API_CORS_ORIGINS:          {{ .Values.config.apiCorsOrigins | quote }}
