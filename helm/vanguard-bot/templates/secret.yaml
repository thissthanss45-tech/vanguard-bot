{{/*
Secret с чувствительными переменными.

ВАЖНО: не коммитить values с реальными секретами!
Использовать:
  helm upgrade ... --set secrets.telegramBotToken="..." \
                   --set secrets.apiAdminKey="..."
Или External Secrets Operator / Sealed Secrets / Vault.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vanguard-bot.fullname" . }}-secret
  namespace: {{ include "vanguard-bot.namespace" . }}
  labels:
    {{- include "vanguard-bot.labels" . | nindent 4 }}
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  DEEPSEEK_API_KEY:   {{ .Values.secrets.deepseekApiKey | quote }}
  GROQ_API_KEY:       {{ .Values.secrets.groqApiKey | quote }}
  ANTHROPIC_API_KEY:  {{ .Values.secrets.anthropicApiKey | quote }}
  WEBHOOK_URL:        {{ .Values.secrets.webhookUrl | quote }}
  AUTH_WHITELIST:     {{ .Values.secrets.authWhitelist | quote }}
  ADMIN_CHAT_ID:      {{ .Values.secrets.adminChatId | quote }}
  API_ADMIN_KEY:      {{ .Values.secrets.apiAdminKey | quote }}
  API_DATABASE_URL:   {{ .Values.secrets.apiDatabaseUrl | quote }}
  STRIPE_WEBHOOK_SECRET:  {{ .Values.secrets.stripeWebhookSecret | quote }}
  STRIPE_API_KEY:         {{ .Values.secrets.stripeApiKey | quote }}
  STRIPE_PRICE_PRO:       {{ .Values.secrets.stripePricePro | quote }}
  STRIPE_PRICE_ENTERPRISE: {{ .Values.secrets.stripePriceEnterprise | quote }}
