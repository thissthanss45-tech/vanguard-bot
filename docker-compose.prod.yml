services:
  redis:
    image: redis:7-alpine
    container_name: vanguard-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vanguard-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
      USE_WEBHOOK: "false"
      WEBHOOK_PORT: 8080
      WEBHOOK_PATH: /telegram
    ports:
      - "18080:8080"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

  watchdog:
    image: vanguard_bot-bot:latest
    container_name: vanguard-watchdog
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USE_WEBHOOK: "false"
      WEBHOOK_PATH: /telegram
      WATCHDOG_INTERVAL_SEC: 180
    command: ["python", "scripts/runtime_watchdog.py"]
    depends_on:
      bot:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  redis_data:
